<!DOCTYPE html>
<html>

<head>

<title>Hackathon Break Portal</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:12px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login{
background:#2a5298;
color:white;
}

.out{
background:#e74c3c;
color:white;
}

.in{
background:#2ecc71;
color:white;
}

#reader{
width:100%;
margin-top:15px;
}

.info{
margin-top:15px;
background:#f4f4f4;
padding:10px;
border-radius:6px;
}

/* Notification */

#notify{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#2ecc71;
color:white;
padding:12px 20px;
border-radius:6px;
font-weight:bold;
display:none;
z-index:999;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>

</head>

<body>


<!-- Notification -->

<div id="notify"></div>



<!-- LOGIN -->

<div class="card" id="login">

<h2>Hackathon Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>

</div>



<!-- PORTAL -->

<div class="card" id="portal" style="display:none">

<h2>Scan Participant QR</h2>

<div id="reader"></div>

<div class="info">

<h3 id="name">Waiting for scan...</h3>
<h4 id="team"></h4>

</div>

<button class="out" onclick="mark('OUT')">OUT</button>

<button class="in" onclick="mark('IN')">IN</button>

</div>



<script>

/* USERS */

const USERS={
"Babbage":"hack24",
"Codd":"hack24",
"Panini":"hack24",
"Turing":"hack24",
"Lee":"hack24"
}


/* GOOGLE APPS SCRIPT API */

const API="https://script.google.com/macros/s/AKfycbxeb8W9sBW7Rt-YWBj_yVnbnTSafNt4mLoaPDIYyucjxDYYCvNGApIa5zQFlAopqduY/exec"



let html5QrCode

let scannedID=""
let scannedName=""
let scannedTeam=""

let lastScanTime=0



function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(USERS[u] && USERS[u]==p){

document.getElementById("login").style.display="none"
document.getElementById("portal").style.display="block"

startScanner()

}else{

showNotification("Invalid username or password")

}

}



function startScanner(){

html5QrCode=new Html5Qrcode("reader")

html5QrCode.start(
{ facingMode:"environment" },
{
fps:10,
qrbox:250
},
onScanSuccess
)

}



function onScanSuccess(decodedText){

let now=Date.now()

/* prevent multiple scans */

if(now-lastScanTime<2000){
return
}

lastScanTime=now

let parts=decodedText.split("|")

if(parts.length<3){

showNotification("Invalid QR code")
return

}

scannedID=parts[0]
scannedName=parts[1]
scannedTeam=parts[2]

document.getElementById("name").innerText="Name: "+scannedName
document.getElementById("team").innerText="Team: "+scannedTeam

}



function mark(action){

if(scannedID==""){

showNotification("Scan QR first")
return

}

fetch(API,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id:scannedID,
action:action
})

})

.then(res=>res.text())
.then(data=>{

showNotification("✅ "+scannedName+" marked "+action+" — Log updated")

/* reset for next scan */

scannedID=""
document.getElementById("name").innerText="Waiting for scan..."
document.getElementById("team").innerText=""

})

.catch(err=>{

showNotification("Error updating log")

})

}



function showNotification(message){

let box=document.getElementById("notify")

box.innerText=message
box.style.display="block"

setTimeout(()=>{

box.style.display="none"

},3000)

}

</script>

</body>

</html>
