<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hackathon Break Portal</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.container{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
padding:25px;
border-radius:12px;
width:360px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{margin-top:0}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 18px;
margin:8px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.login{background:#2a5298;color:white;}
.out{background:#e74c3c;color:white;}
.in{background:#2ecc71;color:white;}

#reader{
width:100%;
margin-top:15px;
}

.info{
margin-top:15px;
background:#f4f4f4;
padding:10px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

th{
background:#2a5298;
color:white;
}

#notify{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#2ecc71;
color:white;
padding:12px 20px;
border-radius:6px;
font-weight:bold;
display:none;
z-index:999;
}

#reader video{
pointer-events:none;
}

</style>

</head>

<body>

<div id="notify"></div>

<div class="container">

<div class="card" id="login">

<h2>Staff Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="login" onclick="login()">Login</button>

</div>

<div class="card" id="portal" style="display:none">

<h2>Scan Participant</h2>

<div id="reader"></div>

<div class="info">

<h3 id="name">Waiting for scan...</h3>
<h4 id="team"></h4>

</div>

<button class="out" onclick="mark('OUT')">OUT</button>
<button class="in" onclick="mark('IN')">IN</button>

</div>

<div class="card" id="dashboard" style="display:none">

<h2>Participants Outside</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Team</th>
</tr>
</thead>

<tbody id="outList"></tbody>

</table>

</div>

</div>

<script>

const USERS={
"Babbage":"hack24",
"Codd":"hack24",
"Panini":"hack24",
"Turing":"hack24",
"Lee":"hack24"
}

const API="https://script.google.com/macros/s/AKfycbx_GQ2HpAXnXQi4Ro9yCR7RVK6KqxQDQI6VifmiKFprwChe1ka3VaC5gL5TJLV7eEgC/exec"

let html5QrCode
let scannedID=""
let scannedName=""
let scannedTeam=""
let lastScan=0

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(USERS[u] && USERS[u]==p){

document.getElementById("login").style.display="none"
document.getElementById("portal").style.display="block"
document.getElementById("dashboard").style.display="block"

startScanner()
updateDashboard()

setInterval(updateDashboard,5000)

}else{

notify("Invalid login")

}

}

function startScanner(){

html5QrCode=new Html5Qrcode("reader")

html5QrCode.start(
{facingMode:"environment"},
{fps:10,qrbox:250},
onScan
)

}

function onScan(text){

let now=Date.now()

if(now-lastScan<2000)return

lastScan=now

let parts=text.split("|")

scannedID=parts[0]
scannedName=parts[1]
scannedTeam=parts[2]

document.getElementById("name").innerText="Name: "+scannedName
document.getElementById("team").innerText="Team: "+scannedTeam

html5QrCode.pause()

notify("Choose IN or OUT")

}

function mark(action){

if(scannedID===""){
notify("Scan QR first")
return
}

fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
id:scannedID,
name:scannedName,
team:scannedTeam,
action:action
})
})
.then(res=>res.text())
.then(data=>{

console.log("API:",data)

if(data.includes("Logged")){
notify(scannedName+" marked "+action)
}else{
notify("Server error: "+data)
}

setTimeout(()=>{
html5QrCode.resume()
},800)

scannedID=""
document.getElementById("name").innerText="Waiting for scan..."
document.getElementById("team").innerText=""

updateDashboard()

})
.catch(err=>{
console.error(err)
notify("Network error contacting server")
})

}

function updateDashboard(){

fetch(API)
.then(r=>r.json())
.then(data=>{

let table=""

data.forEach(p=>{
table+=`<tr>
<td>${p.name}</td>
<td>${p.team}</td>
</tr>`
})

document.getElementById("outList").innerHTML=table

})

}

function notify(msg){

let n=document.getElementById("notify")

n.innerText=msg
n.style.display="block"

setTimeout(()=>{
n.style.display="none"
},3000)

}

</script>

</body>
</html>
